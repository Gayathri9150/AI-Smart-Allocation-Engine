services:
  - type: web
    name: ai-smart-allocation
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir Backend --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_PATH
        value: /var/data/allocation.db
    disk:
      name: allocation-data
      mountPath: /var/data
      sizeGB: 1
