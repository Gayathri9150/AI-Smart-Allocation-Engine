{% extends "base.html" %}
{% block title %}Post an internship · AI Smart Allocation{% endblock %}
{% block content %}

<section class="auth-wrap">
  <form class="auth-card auth-card-wide" method="POST" novalidate>
    <p class="eyebrow">// {{ session.get('company_name') }}</p>
    <h1 class="auth-title">Post an internship</h1>
    <p class="auth-sub">These requirements are exactly what the matching engine will score students against.</p>

    <div class="field-grid">
      <div class="field-group field-group-full">
        <label class="field-label" for="internship_title">Internship title</label>
        <input class="field-input" type="text" id="internship_title" name="internship_title" placeholder="e.g. Summer Data Analytics Intern" required autofocus>
      </div>

      <div class="field-group">
        <label class="field-label" for="role">Role / department</label>
        <input class="field-input" type="text" id="role" name="role" placeholder="e.g. Computer Science" required>
      </div>

      <div class="field-group">
        <label class="field-label" for="location">Location</label>
        <input class="field-input" type="text" id="location" name="location" required>
      </div>

      <div class="field-group">
        <label class="field-label" for="minimum_cgpa">Minimum CGPA</label>
        <input class="field-input" type="number" step="0.01" min="0" max="10" id="minimum_cgpa" name="minimum_cgpa" required>
      </div>

      <div class="field-group">
        <label class="field-label" for="vacancies">Vacancies</label>
        <input class="field-input" type="number" min="1" id="vacancies" name="vacancies" required>
      </div>

      <div class="field-group field-group-full">
        <label class="field-label" for="required_skills">Required skills</label>
        <input class="field-input" type="text" id="required_skills" name="required_skills" placeholder="Comma-separated, e.g. Python, SQL, React" required>
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-block">Post internship</button>
  </form>
</section>

{% endblock %}
