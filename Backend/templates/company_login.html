{% extends "base.html" %}
{% block title %}Company log in · AI Smart Allocation{% endblock %}
{% block content %}

<section class="auth-wrap">
  <form class="auth-card" method="POST" novalidate>
    <p class="eyebrow">// company portal</p>
    <h1 class="auth-title">Log in</h1>

    <label class="field-label" for="email">Email</label>
    <input class="field-input" type="email" id="email" name="email" required autofocus>

    <label class="field-label" for="password">Password</label>
    <input class="field-input" type="password" id="password" name="password" required>

    <button type="submit" class="btn btn-primary btn-block">Log in</button>

    <p class="auth-footnote">
      New here? <a href="{{ url_for('company_register') }}">Register your company</a>
    </p>
  </form>
</section>

{% endblock %}
